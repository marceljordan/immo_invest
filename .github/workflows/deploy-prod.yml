name: Deploy Fabric to PROD
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fabric-cicd azure-identity
      - name: Deploy to Fabric PROD
        env:
          AZURE_TENANT_ID: ${{ secrets.FABRIC_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.FABRIC_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.FABRIC_CLIENT_SECRET }}
        run: |
          python cicd/deploy.py \
            --environment PROD \
            --workspace-id "${{ secrets.FABRIC_WORKSPACE_PROD_ID }}"
