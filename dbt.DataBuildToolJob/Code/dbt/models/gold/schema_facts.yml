# Fichier : models/gold/schema_facts.yml
#
# Rôle :
# - Déclarer les tests dbt sur les tables de faits Gold.
#
# Actions réalisées :
# - Vérifie que chaque clé technique de fait est non nulle.
# - Vérifie que chaque clé technique de fait est unique.
# - Vérifie les relations entre facts et dimensions.
# - Vérifie certaines mesures obligatoires.
#
# Objectif :
# - Garantir que le modèle Kimball est cohérent :
#   les facts doivent pointer vers des dimensions existantes.

version: 2

models:
  - name: fact_reservation
    description: "Fait des réservations immobilières."
    columns:
      - name: reservation_key
        tests:
          - not_null
          - unique

      - name: reservation_id
        tests:
          - not_null
          - unique

      - name: date_reservation_key
        tests:
          - relationships:
              to: ref('dim_date')
              field: date_key

      - name: investisseur_key
        tests:
          - relationships:
              to: ref('dim_investisseur')
              field: investisseur_key

      - name: partenaire_key
