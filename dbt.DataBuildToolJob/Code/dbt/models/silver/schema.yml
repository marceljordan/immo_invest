version: 2

models:

  - name: agences_regions
    description: >
      Table Silver des agences et régions. Nettoie et type les données brutes
      de src_agences_regions. Référentiel agence/région pour les dimensions Gold.
    columns:
      - name: agence_id
        description: Identifiant unique de l'agence.
        tests:
          - not_null
          - unique
      - name: nom_agence
        description: Nom de l'agence (nettoyé).
      - name: code_agence
        description: Code interne de l'agence (normalisé en majuscules).
      - name: region_id
        description: Identifiant de la région de rattachement.
      - name: nom_region
        description: Nom de la région.
      - name: directeur_region_id
        description: Identifiant du directeur régional.
      - name: responsable_agence_id
        description: Identifiant du responsable d'agence.
      - name: statut_agence
        description: Statut de l'agence (normalisé en majuscules).
      - name: date_ouverture
        description: Date d'ouverture de l'agence.
      - name: date_fermeture
        description: Date de fermeture de l'agence si applicable.
      - name: is_active
        description: Indicateur d'agence active (0/1).
        tests:
          - not_null

  - name: commissions
    description: >
      Table Silver des commissions. Nettoie et type les données brutes
      de src_commissions. Source pour fact_commission en Gold.
    columns:
      - name: commission_id
        description: Identifiant unique de la commission.
        tests:
          - not_null
          - unique
      - name: type_operation
        description: Type d'opération (normalisé en majuscules).
        tests:
          - not_null
      - name: investisseur_id
        description: Identifiant de l'investisseur.
      - name: partenaire_id
        description: Identifiant du partenaire apporteur.
      - name: conseiller_id
        description: Identifiant du conseiller.
      - name: montant_commission_brut
        description: Montant brut de la commission en euros.
      - name: montant_commission_net
        description: Montant net de la commission en euros.
      - name: statut_commission
        description: Statut de la commission (normalisé en majuscules).
      - name: is_deleted
        description: Indicateur de suppression logique.
        tests:
          - not_null

  - name: conseillers
    description: >
      Table Silver des conseillers commerciaux. Nettoie et type les données
      de src_conseillers. Référentiel conseiller pour dim_conseiller en Gold.
    columns:
      - name: conseiller_id
        description: Identifiant unique du conseiller.
        tests:
          - not_null
          - unique
      - name: matricule
        description: Matricule RH (normalisé en majuscules).
      - name: email
        description: Email professionnel (normalisé en minuscules).
      - name: agence_id
        description: Identifiant de l'agence de rattachement.
      - name: statut_collaborateur
        description: Statut RH du collaborateur (normalisé en majuscules).
      - name: objectif_annuel
        description: Objectif commercial annuel en euros.
      - name: objectif_mensuel_moyen
        description: Objectif mensuel moyen en euros.
      - name: is_active
        description: Indicateur de conseiller actif.
        tests:
          - not_null

  - name: crm_investisseurs
    description: >
      Table Silver des investisseurs CRM. Nettoie et type les données
      de src_crm_investisseurs. Source pour dim_investisseur en Gold.
    columns:
      - name: investisseur_id
        description: Identifiant unique de l'investisseur.
        tests:
          - not_null
          - unique
      - name: prospect_id
        description: Identifiant du prospect CRM associé.
      - name: email
        description: Email (normalisé en minuscules).
      - name: statut_kyc
        description: Statut KYC (normalisé en majuscules).
      - name: statut_lcbft
        description: Statut LCB-FT (normalisé en majuscules).
      - name: revenu_annuel
        description: Revenu annuel en euros.
      - name: patrimoine_financier
        description: Patrimoine financier en euros.
      - name: patrimoine_immobilier
        description: Patrimoine immobilier en euros.
      - name: profil_investisseur
        description: Profil de risque (normalisé en majuscules).
      - name: statut_client
        description: Statut commercial (normalisé en majuscules).
      - name: is_deleted
        description: Indicateur de suppression logique.
        tests:
          - not_null

  - name: crm_prospects
    description: >
      Table Silver des prospects CRM. Nettoie et type les données
      de src_crm_prospects. Permet d'analyser le tunnel prospect → investisseur.
    columns:
      - name: prospect_id
        description: Identifiant unique du prospect.
        tests:
          - not_null
          - unique
      - name: email
        description: Email (normalisé en minuscules).
      - name: statut_prospect
        description: Statut du prospect (normalisé en majuscules).
      - name: canal_acquisition
        description: Canal d'acquisition (normalisé en majuscules).
      - name: score_qualification
        description: Score de qualification du prospect.
      - name: revenu_annuel_estime
        description: Revenu annuel estimé en euros.
      - name: capacite_investissement
        description: Capacité d'investissement estimée en euros.
      - name: is_deleted
        description: Indicateur de suppression logique.
        tests:
          - not_null

  - name: dossiers_adv
    description: >
      Table Silver des dossiers ADV (Administration des Ventes). Nettoie
      et type les données de src_dossiers_adv. Source pour fact_dossier_adv en Gold.
    columns:
      - name: dossier_adv_id
        description: Identifiant unique du dossier ADV.
        tests:
          - not_null
          - unique
      - name: vente_id
        description: Identifiant de la vente associée.
      - name: statut_dossier
        description: Statut du dossier (normalisé en majuscules).
      - name: delai_traitement_jours
        description: Délai de traitement en jours.
      - name: pieces_manquantes
        description: Indicateur de pièces manquantes (0/1).
      - name: nombre_relances
        description: Nombre de relances effectuées.
      - name: blocage_adv
        description: Indicateur de blocage ADV (0/1).
      - name: is_deleted
        description: Indicateur de suppression logique.
        tests:
          - not_null

  - name: evenements_clients
    description: >
      Table Silver des événements clients : appels, emails, rendez-vous, relances.
      Source pour analyser l'activité relationnelle et commerciale.
    columns:
      - name: evenement_id
        description: Identifiant unique de l'événement.
        tests:
          - not_null
          - unique
      - name: type_evenement
        description: Type d'événement (normalisé en majuscules).
      - name: canal_evenement
        description: Canal de l'événement (normalisé en majuscules).
      - name: statut_evenement
        description: Statut de l'événement (normalisé en majuscules).
      - name: priorite
        description: Niveau de priorité (normalisé en majuscules).
      - name: is_deleted
        description: Indicateur de suppression logique.
        tests:
          - not_null

  - name: expertise_comptable_lmnp
    description: >
      Table Silver des dossiers d'expertise comptable LMNP. Nettoie et type
      les données de src_expertise_comptable_lmnp.
    columns:
      - name: dossier_comptable_id
        description: Identifiant unique du dossier comptable.
        tests:
          - not_null
          - unique
      - name: investisseur_id
        description: Identifiant de l'investisseur.
      - name: annee_fiscale
        description: Année fiscale concernée.
      - name: regime_fiscal
        description: Régime fiscal (normalisé en majuscules).
      - name: statut_dossier_comptable
        description: Statut du dossier (normalisé en majuscules).
      - name: recettes_locatives
        description: Recettes locatives de l'année en euros.
      - name: charges_deductibles
        description: Charges déductibles en euros.
      - name: amortissements
        description: Amortissements comptabilisés en euros.
      - name: resultat_fiscal
        description: Résultat fiscal en euros.
      - name: impot_estime
        description: Impôt estimé en euros.
      - name: pieces_manquantes
        description: Indicateur de pièces manquantes (0/1).
      - name: is_deleted
        description: Indicateur de suppression logique.
        tests:
          - not_null

  - name: financements
    description: >
      Table Silver des financements immobiliers. Nettoie et type les données
      de src_financements. Source pour fact_financement en Gold.
    columns:
      - name: financement_id
        description: Identifiant unique du financement.
        tests:
          - not_null
          - unique
      - name: vente_id
        description: Identifiant de la vente associée.
      - name: banque
        description: Nom de la banque (normalisé en majuscules).
      - name: montant_demande
        description: Montant de financement demandé en euros.
      - name: montant_accorde
        description: Montant accordé par la banque en euros.
      - name: taux_credit
        description: Taux du crédit (ex. 0.0350 = 3.5%).
      - name: statut_financement
        description: Statut du financement (normalisé en majuscules).
      - name: is_deleted
        description: Indicateur de suppression logique.
        tests:
          - not_null

  - name: gestion_locative
    description: >
      Table Silver de gestion locative. Nettoie et type les données
