        description: Identifiant unique de la réclamation.
        tests:
          - not_null
          - unique
      - name: type_reclamation
        description: Type de réclamation (normalisé en majuscules).
      - name: categorie_reclamation
        description: Catégorie de réclamation (normalisé en majuscules).
      - name: niveau_urgence
        description: Niveau d'urgence (normalisé en majuscules).
      - name: statut_reclamation
        description: Statut de la réclamation (normalisé en majuscules).
