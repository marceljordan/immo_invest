      - name: dispositif_fiscal
        description: Dispositif fiscal (Pinel, LMNP... normalisé en majuscules).
      - name: label_energetique
        description: Label énergétique (normalisé en majuscules).
      - name: is_active
        description: Indicateur de programme actif.
        tests:
          - not_null

  - name: reclamations_incidents
    description: >
