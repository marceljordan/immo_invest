      - name: type_partenaire
        description: Type de partenaire (normalisé en majuscules).
      - name: statut_partenaire
        description: Statut du partenaire (normalisé en majuscules).
      - name: email_contact
        description: Email du contact (normalisé en minuscules).
      - name: niveau_partenaire
        description: Niveau de partenariat (normalisé en majuscules).
      - name: encours_total_apporte
        description: Encours total apporté en euros.
      - name: commission_rate_default
        description: Taux de commission par défaut.
      - name: is_active
        description: Indicateur de partenaire actif.
        tests:
          - not_null

  - name: produits_investissement
    description: >
