          - unique
      - name: statut_gestion
        description: Statut de gestion (normalisé en majuscules).
      - name: loyer_mensuel_prevu
        description: Loyer mensuel prévu en euros.
      - name: loyer_mensuel_reel
        description: Loyer mensuel réel encaissé en euros.
      - name: taux_occupation
        description: Taux d'occupation (0 à 1).
      - name: incident_locatif
        description: Indicateur d'incident locatif (0/1).
      - name: montant_impayes
        description: Montant des impayés en euros.
      - name: rendement_reel_annuel
        description: Rendement locatif réel annuel.
      - name: is_active
        description: Indicateur de dossier actif.
        tests:
          - not_null

  - name: lots_immobiliers
    description: >
      Table Silver des lots immobiliers. Nettoie et type les données
