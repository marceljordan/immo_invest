    columns:
      - name: lot_id
        description: Identifiant unique du lot.
        tests:
          - not_null
          - unique
      - name: programme_id
        description: Identifiant du programme parent.
      - name: type_lot
        description: Type de lot (normalisé en majuscules).
      - name: typologie
        description: Typologie du lot (T1, T2... normalisé en majuscules).
      - name: surface_m2
        description: Surface en m².
      - name: prix_catalogue
        description: Prix catalogue en euros.
      - name: prix_final
        description: Prix final après remise en euros.
      - name: statut_lot
        description: Statut du lot (normalisé en majuscules).
      - name: is_active
        description: Indicateur de lot actif.
        tests:
          - not_null

  - name: objectifs_commerciaux
    description: >
      Table Silver des objectifs commerciaux. Nettoie et type les données
