        description: Identifiant unique de l'opération.
        tests:
          - not_null
          - unique
      - name: statut_operation
        description: Statut de l'opération (normalisé en majuscules).
      - name: montant_investi
        description: Montant investi en euros.
      - name: taux_rendement_annuel_prevu
        description: Taux de rendement annuel prévu.
      - name: incident_paiement
        description: Indicateur d'incident de paiement (0/1).
      - name: is_deleted
        description: Indicateur de suppression logique.
